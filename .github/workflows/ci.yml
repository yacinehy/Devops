# Pipeline CI — déclenché à chaque push ou pull request vers main
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Machine virtuelle fournie par GitHub (Ubuntu gratuit)
    runs-on: ubuntu-latest

    # Strategy matrix : GitHub crée un job distinct par valeur de python-version.
    # Les deux jobs tournent en parallèle sur des VMs séparées — le push déclenche
    # donc 2 runs simultanés : un avec Python 3.11, un avec Python 3.12.
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      # 1. Récupère le code source du dépôt dans le runner
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Installe la version Python définie par la matrice (${{ matrix.python-version }}).
      #    Ce placeholder est remplacé automatiquement : "3.11" dans un job, "3.12" dans l'autre.
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 3. Restaure le cache pip — la clé inclut la version Python pour éviter
      #    tout mélange de packages entre les deux jobs de la matrice.
      - name: Cache des dépendances pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      # 4. Met à jour pip puis installe toutes les dépendances du projet.
      #    Si le cache du step précédent est valide, cette étape est quasi-instantanée.
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Lint : vérifie la qualité du code (style, imports inutilisés, bugs courants).
      #    Séparé volontairement des tests pour identifier précisément la source d'un échec :
      #    si ce step est rouge, c'est un problème de style — pas un bug logique.
      - name: Lint — ruff check
        run: ruff check .

      # 6. Tests : exécute pytest et affiche le rapport de couverture ligne par ligne.
      #    Séparé du lint pour la même raison : si ce step est rouge, c'est un test
      #    qui échoue, pas un problème de formatage.
      - name: Tests — pytest + coverage
        run: pytest --cov=app --cov-report=term-missing
