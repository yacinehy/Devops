# Pipeline CD — Build et push de l'image Docker sur Docker Hub
# Se déclenche uniquement sur push vers main (pas sur les PRs —
# on ne publie pas une image d'une branche non validée)
name: Docker Build & Push

on:
  push:
    branches: [main]

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — test
  # Exactement les mêmes vérifications que ci.yml.
  # Principe : on ne construit jamais une image dont les tests échouent.
  # ───────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache des dépendances pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint — ruff check
        run: ruff check .

      - name: Tests — pytest + coverage
        run: pytest --cov=app --cov-report=term-missing


  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — build-and-push
  #
  # Conditions cumulatives pour s'exécuter :
  #   1. needs: test     → les deux jobs de la matrix (3.11 ET 3.12) ont réussi
  #   2. github.ref      → on est bien sur la branche main (pas une PR, pas une
  #                        branche feature/*)
  #
  # Séparé en job distinct pour deux raisons :
  #   - Lisibilité : dans l'onglet Actions, "test" et "build-and-push" sont
  #     deux colonnes avec leur propre statut ✅/❌
  #   - Sécurité : les secrets Docker Hub ne sont accessibles que dans ce job,
  #     pas dans le job de test
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest

    needs: test   # attend que TOUS les jobs "test" (matrix 3.11 + 3.12) soient verts

    # Double condition : tests OK + branche main uniquement
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Docker Buildx est le backend de build moderne (supporte multi-platform,
      # cache avancé, BuildKit). Requis par build-push-action.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authentification sur Docker Hub via les secrets du dépôt GitHub.
      # Ne jamais écrire les credentials en clair — passer toujours par secrets.*
      # À configurer dans : Settings → Secrets → Actions → New repository secret
      - name: Login sur Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Génère automatiquement les tags à partir du contexte Git :
      #   type=raw,value=latest   → tag "latest" (pointe toujours la dernière image)
      #   type=sha                → tag du SHA court du commit (ex: sha-a1b2c3d)
      #                            immuable — identifie exactement ce commit
      - name: Génération des tags Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: yacinehy/devops-cicd
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Build multi-platform et push vers Docker Hub en une seule étape.
      # Le cache GHA (GitHub Actions) stocke les layers Docker entre les runs :
      #   cache-from : tente de restaurer le cache du run précédent
      #   cache-to   : sauvegarde le cache après le build pour le prochain run
      # Résultat : si requirements-prod.txt n'a pas changé, le layer pip
      # est restauré depuis le cache → build ~2x plus rapide
      - name: Build et push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — scan
  #
  # Analyse l'image qui vient d'être publiée sur Docker Hub.
  # On scanne APRÈS le push (et non l'image locale) pour deux raisons :
  #   1. On teste exactement ce qui sera déployé en production
  #   2. Trivy peut utiliser les métadonnées de l'image distante
  #
  # Positionnement dans la chaîne :
  #   test → build-and-push → scan
  #   Si scan échoue, l'image est déjà sur Docker Hub MAIS le pipeline
  #   est rouge → signal clair qu'elle ne doit pas être déployée.
  # ───────────────────────────────────────────────────────────────────────────
  scan:
    runs-on: ubuntu-latest

    needs: build-and-push   # l'image doit exister sur Docker Hub avant de la scanner

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Trivy est le scanner de vulnérabilités open-source d'Aqua Security.
      # Il interroge plusieurs bases de données de CVE (NVD, GitHub Advisory,
      # Red Hat, etc.) et analyse :
      #   - les packages OS (apt, apk…)
      #   - les packages Python (pip), Node (npm), etc.
      #   - les fichiers de config (Dockerfile, k8s manifests…)
      - name: Scanner l'image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          # Image publiée dans le job précédent — on scanne ce qui est en prod
          image-ref: yacinehy/devops-cicd:latest

          # Format "table" : rapport lisible directement dans les logs Actions
          # Alternatives : "json" (pour l'intégrer à un SIEM), "sarif" (pour
          # GitHub Security tab), "cyclonedx" (SBOM)
          format: table

          # exit-code 1 = le pipeline échoue si une CVE bloquante est trouvée.
          # Sans ça, Trivy affiche les vulnérabilités mais le job reste vert —
          # l'équipe peut les ignorer sans s'en rendre compte.
          exit-code: '1'

          # On bloque uniquement sur CRITICAL et HIGH.
          # MEDIUM / LOW / UNKNOWN : loggés dans le rapport mais non bloquants.
          # Raison : bloquer sur MEDIUM génère trop de faux positifs et ralentit
          # les livraisons pour des vulnérabilités souvent non exploitables.
          severity: CRITICAL,HIGH

          # Ignorer les CVE sans correctif disponible.
          # Une CVE "unfixed" ne peut pas être résolue par une mise à jour —
          # la bloquer ne servirait qu'à geler les déploiements indéfiniment.
          ignore-unfixed: true
